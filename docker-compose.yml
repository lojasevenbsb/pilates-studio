services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: pilates-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - internal
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/', (r) => process.exit(r.statusCode >= 500 ? 1 : 0)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  nginx:
    image: nginx:1.27-alpine
    container_name: pilates-nginx
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal
      - external

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge

volumes:
  nginx_logs:
