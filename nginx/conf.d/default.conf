upstream nextjs_app {
    server app:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"              always;
    add_header X-Content-Type-Options    "nosniff"                 always;
    add_header X-XSS-Protection          "1; mode=block"           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none"            always;

    # ── Remover headers que expõem informações ────────────────────────────────
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # ── Rate limiting ────────────────────────────────────────────────────────
    limit_req  zone=req_limit  burst=60  nodelay;
    limit_conn zone=conn_limit 20;

    # ── Bloquear métodos HTTP não usados ──────────────────────────────────────
    if ($request_method !~ ^(GET|POST|HEAD|OPTIONS|PUT|DELETE|PATCH)$) {
        return 405;
    }

    # ── Bloquear acesso a arquivos ocultos ────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Assets estáticos Next.js (_next/static) ───────────────────────────────
    location /_next/static/ {
        proxy_pass http://nextjs_app;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # ── Assets estáticos Next.js (imagens, etc.) ──────────────────────────────
    location /_next/image {
        proxy_pass http://nextjs_app;
        add_header Cache-Control "public, max-age=86400";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Proxy principal para o app Next.js ───────────────────────────────────
    location / {
        proxy_pass         http://nextjs_app;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_buffering          on;
        proxy_buffer_size        4k;
        proxy_buffers            8 16k;
        proxy_busy_buffers_size  32k;

        # Não expor detalhes de erros do upstream
        proxy_intercept_errors on;
        error_page 500 502 503 504 /50x.html;
    }

    # ── Página de erro genérica ───────────────────────────────────────────────
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
